name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_DOMAIN: postmanchat.live
      APP_WWW_DOMAIN: www.postmanchat.live

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Guard Flyway migrations
      run: |
        chmod +x .github/scripts/check_flyway_migrations.sh
        ./.github/scripts/check_flyway_migrations.sh "${{ github.event.before }}" "${{ github.sha }}"

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        script: |
          cd ~

          # Free docker build cache before pulling the latest repo.
          docker system prune -af || true
          docker builder prune -af || true

          # Clone repo if not exists, then hard-reset to exact remote state.
          # git pull alone does not remove files deleted on the remote, which
          # causes stale Flyway migration files to be baked into the image.
          if [ ! -d "postman-chat" ]; then
            git clone https://github.com/${{ github.repository }}.git postman-chat
          fi
          cd postman-chat
          git fetch origin
          git reset --hard origin/main
          git clean -fd

          sudo mkdir -p /etc/postman-chat
          sudo mkdir -p /var/lib/postman-chat/uploads
          sudo cp deploy/nginx/postmanchat.live.conf.template /etc/postman-chat/nginx.conf.template
          sudo cp deploy/ec2/setup-nginx-certbot.sh /usr/local/bin/postman-chat-setup-nginx
          sudo chmod +x /usr/local/bin/postman-chat-setup-nginx

          APP_DOMAIN="${{ env.APP_DOMAIN }}" \
          APP_WWW_DOMAIN="${{ env.APP_WWW_DOMAIN }}" \
          LETSENCRYPT_EMAIL="${{ secrets.LETSENCRYPT_EMAIL }}" \
          /usr/local/bin/postman-chat-setup-nginx

          # Stop and remove old container
          docker stop postman-chat || true
          docker rm postman-chat || true

          # Build new image with frontend env vars
          docker build -t postman-chat \
            --build-arg VITE_SUPABASE_URL="${{ secrets.VITE_SUPABASE_URL }}" \
            --build-arg VITE_SUPABASE_ANON_KEY="${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            --build-arg VITE_SUPABASE_STORAGE_BUCKET="chat-uploads" \
            --build-arg VITE_PUBLIC_SITE_URL="https://${{ env.APP_DOMAIN }}" \
            --build-arg VITE_API_BASE_URL="https://${{ env.APP_DOMAIN }}" \
            .

          # Run container behind Nginx
          docker run -d --name postman-chat \
            -p 127.0.0.1:8080:8080 \
            --restart always \
            -v /var/lib/postman-chat/uploads:/app/backend/uploads \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            -e DB_USERNAME="${{ secrets.DB_USERNAME }}" \
            -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            -e SUPABASE_JWT_ISSUER="${{ secrets.SUPABASE_JWT_ISSUER }}" \
            -e CORS_ORIGINS="https://${{ env.APP_DOMAIN }},https://${{ env.APP_WWW_DOMAIN }}" \
            -e STORAGE_BASE_URL="https://${{ env.APP_DOMAIN }}" \
            -e IGRIS_NVIDIA_API_KEY="${{ secrets.IGRIS_NVIDIA_API_KEY }}" \
            -e EMAIL_NOTIFICATIONS_ENABLED="${{ secrets.EMAIL_NOTIFICATIONS_ENABLED }}" \
            -e EMAIL_FROM="${{ secrets.EMAIL_FROM }}" \
            -e MAIL_HOST="${{ secrets.MAIL_HOST }}" \
            -e MAIL_PORT="${{ secrets.MAIL_PORT }}" \
            -e MAIL_USERNAME="${{ secrets.MAIL_USERNAME }}" \
            -e MAIL_PASSWORD="${{ secrets.MAIL_PASSWORD }}" \
            -e MAIL_SMTP_AUTH="${{ secrets.MAIL_SMTP_AUTH }}" \
            -e MAIL_SMTP_STARTTLS="${{ secrets.MAIL_SMTP_STARTTLS }}" \
            postman-chat

          sudo systemctl restart nginx

          
