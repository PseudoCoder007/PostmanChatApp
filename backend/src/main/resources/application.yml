server:
  port: ${SERVER_PORT:8080}

spring:
  config:
    import: optional:file:./.env[.properties],optional:file:./backend/.env[.properties]
  application:
    name: postman-chat-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://127.0.0.1:54322/postgres?sslmode=disable}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SUPABASE_JWT_ISSUER:https://YOUR_PROJECT_REF.supabase.co/auth/v1}

postman-chat:
  storage:
    base-url: ${STORAGE_BASE_URL:http://localhost:8080}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
  messages:
    max-content-length: 8000
  igris:
    api-url: ${IGRIS_NVIDIA_API_URL:https://integrate.api.nvidia.com/v1/chat/completions}
    api-key: ${IGRIS_NVIDIA_API_KEY:}
    model: ${IGRIS_MODEL:meta/llama-3.1-70b-instruct}
  notifications:
    email:
      enabled: ${EMAIL_NOTIFICATIONS_ENABLED:false}
      from: ${EMAIL_FROM:no-reply@postmanchat.local}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized

resilience4j:
  ratelimiter:
    instances:
      sendMessage:
        limit-for-period: 60
        limit-refresh-period: 1m
        timeout-duration: 0s
      friendRequest:
        limit-for-period: 10
        limit-refresh-period: 1m
        timeout-duration: 0s
      submitReport:
        limit-for-period: 5
        limit-refresh-period: 1m
        timeout-duration: 0s

logging:
  level:
    root: INFO
    com.postmanchat: INFO
    org.springframework.web.socket: INFO
